services:
  postgres:
    image: postgres:18-alpine
    container_name: c-postgres-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql
    shm_size: 128mb
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres-data:
